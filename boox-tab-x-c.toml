# PaperCast config for the Onyx Boox Tab X C.
# 13.3" Kaleido 3: monochrome 3200x2400 @ 300 ppi, 16 gray levels.
#
# Host:   papercast run --config boox-tab-x-c.toml
# Bridge: adb reverse tcp:5900 tcp:5900
# Tablet: AVNC -> 127.0.0.1:5900

[eink]
contrast = 1.3          # Kaleido 3 mono contrast is lower than plain Carta; push harder
gamma = 0.9             # lift midtones a touch to compensate
black-point = 8
white-point = 248
invert = false          # set true if your desktop theme is dark
sharpen = 1.2           # 300 ppi rewards extra edge crispness
sharpen-radius = 1
dither = "bayer"        # coordinate-anchored → stable under partial updates (see the reading experiment below)
levels = 16             # the panel's native grayscale depth
fit = "letterbox"
target-size = [3200, 2400]

[mirror]
listen = "127.0.0.1:5900"   # loopback only; adb reverse bridges the USB cable
fps = 15
# output = "DP-1"           # pick with `papercast probe`; defaults to the first output
tile-size = 64
full-refresh-secs = 60      # periodic ghost-clearing full redraw
full-refresh-updates = 0

# --- M9 experiment: Atkinson dithering for reading mode ---
# On LCD stills (M8 visual gate), Atkinson error-diffusion beats Bayer for
# static reading content: smoother tonal gradients, and flat backgrounds go
# nearly solid instead of Bayer's fine crosshatch. Its weakness is temporal —
# error diffusion is order-dependent, so a tiny input change can re-dither
# neighboring pixels and shimmer under partial updates (scrolling, typing).
# `reading` mode full-refreshes on every change, which largely masks that, so
# it's the one mode where Atkinson is a plausible default.
#
# But an LCD showing a PNG isn't the judge — EPD ghosting, the panel's refresh
# mode, and Boox's own dithering pipeline can all change the outcome. So Bayer
# stays the default until this is A/B'd on the actual tablet. To run that test,
# uncomment below: this overlay merges on top of the built-in `reading` mode
# (which otherwise forces bayer), so `papercast ctl mode reading` uses Atkinson.
#
# [modes.reading]
# dither = "atkinson"
